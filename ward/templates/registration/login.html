<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login - Ward Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a0a2e 0%, #4a148c 50%, #6a1b9a 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      overflow: hidden;
      position: relative;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(60px);
      z-index: 0;
    }

    body::before {
      width: 400px;
      height: 400px;
      top: -100px;
      left: -100px;
      animation: float 20s ease-in-out infinite;
    }

    body::after {
      width: 300px;
      height: 300px;
      bottom: -80px;
      right: -80px;
      animation: float 25s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    .login-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      width: 380px;
      max-width: 90%;
      text-align: center;
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      position: relative;
      z-index: 1;
    }

    .login-card h2 {
      margin-bottom: 30px;
      font-weight: 500;
      color: white;
      font-size: 1.75rem;
    }

    .login-card .subtitle {
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.9rem;
      margin-bottom: 30px;
      margin-top: -20px;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.9);
      text-align: left;
      font-weight: 500;
    }

    .input-box {
      margin-bottom: 20px;
      position: relative;
    }

    .form-control,
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.15);
      color: white;
      outline: none;
      font-size: 0.95rem;
    }

    .form-control::placeholder,
    input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .form-control:focus,
    input:focus {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.5);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
    }

    .forget {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 25px;
      align-items: center;
      color: rgba(255, 255, 255, 0.8);
    }

    .forget label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      margin: 0;
    }

    .forget input[type="checkbox"] {
      width: auto;
      margin: 0;
    }

    .forget a {
      color: #d199ff;
      text-decoration: none;
    }

    .forget a:hover {
      color: #e1b5ff;
    }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #ffffff;
      color: #4a148c;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
    }

    button[type="submit"]:hover {
      background: #e0e0e0;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
    }

    .register {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
    }

    .register a {
      color: #d199ff;
      text-decoration: none;
      font-weight: bold;
    }

    .register a:hover {
      color: #e1b5ff;
    }

    .alert-danger {
      background: rgba(220, 38, 38, 0.2);
      border: 1px solid rgba(220, 38, 38, 0.4);
      color: #fecaca;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }

    .text-danger {
      color: #fca5a5 !important;
      font-size: 0.8rem;
      margin-top: 6px;
      text-align: left;
    }

    .icon-header {
      display: inline-flex;
      padding: 16px;
      margin-bottom: 20px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="icon-header">
      <i class="bi bi-hospital-fill" style="font-size: 2.5rem; color: white;"></i>
    </div>
    <h2>Login</h2>
    <p class="subtitle">Ward Management System</p>
    
    <form method="post">
      {% csrf_token %}
      
      {% if form.non_field_errors %}
        <div class="alert alert-danger">
          <i class="bi bi-exclamation-circle-fill me-2"></i>
          {{ form.non_field_errors.0 }}
        </div>
      {% endif %}

      <div class="input-box">
        <label class="form-label">Email</label>
        <input type="email" name="username" placeholder="you@hospital.com" 
               value="{{ form.username.value|default:'' }}" required>
        {% if form.username.errors %}
          <div class="text-danger"><i class="bi bi-x-circle"></i> {{ form.username.errors.0 }}</div>
        {% endif %}
      </div>

      <div class="input-box">
        <label class="form-label">Password</label>
        <input type="password" name="password" placeholder="Password" required>
        {% if form.password.errors %}
          <div class="text-danger"><i class="bi bi-x-circle"></i> {{ form.password.errors.0 }}</div>
        {% endif %}
      </div>

      <button type="submit">Log in</button>

      <div class="register">
        <p>Don't have an account? <a href="{% url 'register' %}">Register</a></p>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
